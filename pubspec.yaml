name: red_grid_link
description: Offline-first MGRS-native proximity coordination platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_map: ^7.0.2
  flutter_map_mbtiles: ^1.0.0
  latlong2: ^0.9.1
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.21
  shared_preferences: ^2.2.3
  flutter_blue_plus: ^1.31.0
  geolocator: ^11.1.0
  permission_handler: ^11.3.1
  pdf: ^3.10.8
  printing: ^5.12.0
  in_app_purchase: ^3.1.13
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1
  flutter_tts: ^4.0.2
  pointycastle: ^3.7.4
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^9.0.0
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
  wakelock_plus: ^1.2.5
  sensors_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  drift_dev: ^2.15.0
  build_runner: ^2.4.9
  mockito: ^5.4.4
  in_app_purchase_platform_interface: ^1.4.0
  flutter_launcher_icons: ^0.14.3
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
